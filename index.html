<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frutisa del Terror: Las Puertas</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at center, rgba(60,0,0,0.25) 0%, rgba(0,0,0,0.95) 70%),
        linear-gradient(180deg, #0a0a0a 0%, #1a0000 100%);
      color: #fff;
      overflow: hidden;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .fog {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 30%),
        radial-gradient(circle at 80% 50%, rgba(255,255,255,0.04), transparent 25%),
        radial-gradient(circle at 40% 80%, rgba(255,255,255,0.03), transparent 35%);
      animation: fogMove 12s linear infinite alternate;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fogMove {
      0% { transform: translateX(-20px) translateY(0px) scale(1); }
      100% { transform: translateX(20px) translateY(-10px) scale(1.08); }
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.08;
      background-image:
        linear-gradient(rgba(255,255,255,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 4px 4px;
      pointer-events: none;
      z-index: 2;
    }

    .titleBox {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
      width: min(92vw, 900px);
    }

    .titleBox h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4rem);
      color: #ff4c4c;
      text-shadow: 0 0 8px rgba(255,0,0,0.4), 0 0 20px rgba(255,0,0,0.2);
      letter-spacing: 2px;
    }

    .titleBox p {
      margin-top: 10px;
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: #f3d7d7;
    }

    #doorScreen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 4;
      padding: 20px;
    }

    .doorsWrap {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      margin-top: 50px;
    }

    .door {
      position: relative;
      width: 180px;
      height: 320px;
      border-radius: 14px 14px 8px 8px;
      background:
        linear-gradient(180deg, #4b1f1f 0%, #2b0e0e 60%, #160707 100%);
      border: 4px solid #120303;
      box-shadow:
        0 0 20px rgba(255,0,0,0.12),
        inset 0 0 10px rgba(255,255,255,0.05),
        0 20px 30px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
      overflow: hidden;
    }

    .door:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow:
        0 0 30px rgba(255,0,0,0.25),
        inset 0 0 14px rgba(255,255,255,0.08),
        0 24px 35px rgba(0,0,0,0.7);
      filter: brightness(1.1);
    }

    .door::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 25px;
      transform: translateX(-50%);
      width: 120px;
      height: 220px;
      border: 2px solid rgba(255,255,255,0.05);
      border-radius: 60px 60px 6px 6px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.1));
    }

    .door::after {
      content: "";
      position: absolute;
      right: 24px;
      top: 155px;
      width: 14px;
      height: 14px;
      background: radial-gradient(circle, #f9d36d 0%, #9a6c00 80%);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(255,215,100,0.3);
    }

    .doorLabel {
      position: absolute;
      bottom: -40px;
      width: 100%;
      text-align: center;
      font-weight: bold;
      color: #ffd9d9;
      text-shadow: 0 0 8px rgba(255,0,0,0.25);
      font-size: 1rem;
    }

    .hint {
      margin-top: 70px;
      font-size: 1.1rem;
      color: #ffb6b6;
      text-align: center;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    #videoScreen {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 20;
      background: #000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #resultVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .overlayUI {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      text-align: center;
      width: min(90vw, 700px);
    }

    .overlayUI h2 {
      margin: 0;
      color: #fff;
      text-shadow: 0 0 12px rgba(255,0,0,0.45);
      font-size: clamp(1.5rem, 3vw, 2.3rem);
    }

    .overlayUI p {
      margin-top: 8px;
      color: #ffdada;
      font-size: 1rem;
    }

    .backBtn {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 25;
      background: linear-gradient(180deg, #ff4b4b, #8c1111);
      border: none;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      padding: 14px 24px;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }

    .flash {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      opacity: 0;
      pointer-events: none;
      z-index: 15;
    }

    .flash.active {
      animation: flashAnim 0.35s ease;
    }

    @keyframes flashAnim {
      0% { opacity: 0; }
      30% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 700px) {
      .door {
        width: 130px;
        height: 240px;
      }

      .door::before {
        width: 85px;
        height: 160px;
      }

      .door::after {
        top: 118px;
      }

      .doorsWrap {
        gap: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="game">
    <div class="fog"></div>
    <div class="grain"></div>
    <div id="flash" class="flash"></div>

    <div class="titleBox">
      <h1>FRUTISA DEL TERROR</h1>
      <p>Escoge una puerta... y acepta tu destino.</p>
    </div>

    <div id="doorScreen">
      <div class="doorsWrap">
        <div class="door" onclick="openDoor('door1')">
          <div class="doorLabel">Puerta del Susurro</div>
        </div>

        <div class="door" onclick="openDoor('door2')">
          <div class="doorLabel">Puerta del Regalo</div>
        </div>

        <div class="door" onclick="openDoor('door3')">
          <div class="doorLabel">Puerta Maldita</div>
        </div>
      </div>

      <div class="hint">Haz clic en una puerta si te atreves...</div>
    </div>

    <div id="videoScreen">
      <video id="resultVideo" playsinline></video>

      <div class="overlayUI">
        <h2 id="resultTitle">Tu destino...</h2>
        <p id="resultText">Algo te estaba esperando detrás de esa puerta.</p>
      </div>

      <button class="backBtn" onclick="backToDoors()">Volver a intentar</button>
    </div>
  </div>

  <script>
    const doorScreen = document.getElementById("doorScreen");
    const videoScreen = document.getElementById("videoScreen");
    const resultVideo = document.getElementById("resultVideo");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");
    const flash = document.getElementById("flash");

    const doorData = {
      door1: {
        video: "susurro.mp4",
        title: "La Puerta del Susurro",
        text: "Escuchaste tu nombre en la oscuridad... y algo empezó a acercarse."
      },
      door2: {
        video: "regalo.mp4",
        title: "La Puerta del Regalo",
        text: "Parecía una recompensa perfecta... hasta que notaste que algo estaba mal."
      },
      door3: {
        video: "maldita.mp4",
        title: "La Puerta Maldita",
        text: "No debiste abrir esa puerta. Nunca debiste tocarla."
      }
    };

    function playWhoosh() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(180, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.25);

      gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.08, audioCtx.currentTime + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.28);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }

    function playImpact() {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "square";
      osc.frequency.setValueAtTime(70, audioCtx.currentTime);

      gain.gain.setValueAtTime(0.09, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.25);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }

    function openDoor(doorKey) {
      const data = doorData[doorKey];
      if (!data) return;

      playWhoosh();
      flash.classList.add("active");

      setTimeout(() => {
        flash.classList.remove("active");
      }, 350);

      doorScreen.style.display = "none";
      videoScreen.style.display = "flex";

      resultTitle.textContent = data.title;
      resultText.textContent = data.text;
      resultVideo.src = data.video;
      resultVideo.currentTime = 0;
      resultVideo.play().catch(() => {});
      playImpact();
    }

    function backToDoors() {
      resultVideo.pause();
      resultVideo.currentTime = 0;
      resultVideo.src = "";

      videoScreen.style.display = "none";
      doorScreen.style.display = "flex";
    }

    resultVideo.addEventListener("ended", () => {
      // Aquí podrías activar un jumpscare, texto extra o reinicio automático si quieres.
    });
  </script>
</body>
</html>
